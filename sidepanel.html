<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下载商品详情图片</title>
  <script src="vendor/iconify.min.js"></script>
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/file-saver.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a1a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 136px;
    }

    /* Panel Header */
    .panel-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #3a3a3a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .panel-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f5f5f5;
    }
    .image-count {
      font-size: 12px;
      color: #a0a0a0;
    }

    /* Section Headers */
    .section-header {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      cursor: pointer;
      user-select: none;
    }
    .section-header:hover {
      background: #333333;
    }
    .section-header .chevron {
      color: #a0a0a0;
      transition: transform 200ms ease-out;
    }
    .section-header .chevron.collapsed {
      transform: rotate(-90deg);
    }
    .section-header span {
      font-size: 14px;
      font-weight: 600;
      color: #f5f5f5;
    }
    .count-badge {
      font-size: 12px;
      color: #a0a0a0;
      margin-left: auto;
    }

    /* Section Content & Collapse */
    .section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 200ms ease-out;
    }
    .section-content.expanded {
      max-height: none;
      overflow-y: auto;
    }

    /* Image Grid */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .image-item {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      overflow: hidden;
      position: relative;
      background: #2a2a2a;
      cursor: pointer;
    }
    .image-item:hover {
      border-color: #f76001;
      transform: scale(1.02);
    }
    .image-item:active {
      transform: scale(0.98);
    }
    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Checkbox */
    .checkbox {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid #f76001;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
    }
    .checkbox:hover {
      border-color: #d45000;
    }
    .checkbox.checked {
      background: #f76001;
      border-color: #f76001;
    }
    .checkbox.checked:hover {
      background: #2563eb;
    }
    .checkbox .iconify-check {
      display: none;
      color: white;
      font-size: 14px;
    }
    .checkbox.checked .iconify-check {
      display: block;
    }

    /* Panel Footer */
    .panel-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: #1a1a1a;
      border-top: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }
    .refresh-btn {
      width: 100%;
      height: 40px;
      background: #3a3a3a;
      border: none;
      border-radius: 8px;
      color: #f5f5f5;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: background 150ms ease-out;
    }
    .refresh-btn:hover {
      background: #4a4a4a;
    }
    .refresh-btn:active {
      background: #333;
    }
    .refresh-btn .iconify {
      font-size: 18px;
    }
    .download-btn {
      width: 100%;
      height: 48px;
      background: #f76001;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 150ms ease-out;
    }
    .download-btn:hover {
      background: #d45000;
    }
    .download-btn:active {
      background: #b84500;
    }
    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .download-btn .iconify {
      font-size: 20px;
    }

    /* Modal */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      transition: opacity 150ms ease-out;
    }
    #modal.hidden {
      opacity: 0;
    }
    #modal.visible {
      opacity: 1;
    }
    .modal-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .modal-content {
      position: relative;
      z-index: 2;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      transition: background 150ms ease-out;
    }
    .modal-close:hover {
      background: rgba(0,0,0,0.8);
    }
    .modal-close .iconify {
      color: white;
      font-size: 24px;
    }

    /* Status Messages */
    .status {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.7;
      font-size: 14px;
    }
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #a0a0a0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="panel-header">
      <h1>下载商品详情图片</h1>
      <span class="image-count">已选 <span id="selected-count">0</span> / <span id="total-count">0</span> 张</span>
    </header>

    <!-- Main Images Section -->
    <section id="main-images-section">
      <div class="section-header" data-section="main" aria-expanded="true">
        <span class="iconify chevron" data-icon="material-symbols:chevron-down"></span>
        <span>主图</span>
        <span class="count-badge" id="main-count-badge">已选 0 / 0 张</span>
      </div>
      <div class="section-content expanded" id="main-content">
        <div class="image-grid" id="main-grid"></div>
      </div>
    </section>

    <!-- Detail Images Section -->
    <section id="detail-images-section">
      <div class="section-header" data-section="detail" aria-expanded="true">
        <span class="iconify chevron" data-icon="material-symbols:chevron-down"></span>
        <span>详情图</span>
        <span class="count-badge" id="detail-count-badge">已选 0 / 0 张</span>
      </div>
      <div class="section-content expanded" id="detail-content">
        <div class="image-grid" id="detail-grid"></div>
      </div>
    </section>
  </div>

  <footer class="panel-footer">
    <button class="refresh-btn" id="refresh-btn">
      <span class="iconify" data-icon="material-symbols:refresh"></span>
      刷新图片
    </button>
    <button class="download-btn" id="download-btn" disabled>
      <span class="iconify" data-icon="material-symbols:download"></span>
      一键下载
    </button>
  </footer>

  <!-- Modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <img id="modal-image" src="" alt="Full size preview">
    </div>
    <button class="modal-close" id="modal-close" aria-label="Close">
      <span class="iconify" data-icon="material-symbols:close"></span>
    </button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
